version: "3.8"
services:
  db:
    image: postgres
    container_name: user_service
    restart: always
    volumes:
      - user_service_vol:/data/db
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: i_know_you_see_this
      POSTGRES_DB: user_service

volumes:
  user_service_vol:
